<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WP Synchro{% if title %} — {{ title }}{% endif %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">
      <span class="text-warning">WP</span> Synchro
      <small class="text-muted ms-2 fs-6">{{ cfg.profile if cfg else '' }}</small>
    </a>
    <div class="navbar-nav ms-auto d-flex flex-row gap-2 align-items-center">
      <span id="mode-badge" class="badge bg-info fs-6 px-3 py-2">● DRY-RUN</span>
      <div class="nav-item">
        <a class="nav-link {% if active == 'dashboard' %}active text-white{% endif %}" href="/">Dashboard</a>
      </div>
      <div class="nav-item">
        <a class="nav-link {% if active == 'files' %}active text-white{% endif %}" href="/files">Soubory</a>
      </div>
      <div class="nav-item">
        <a class="nav-link {% if active == 'content' %}active text-white{% endif %}" href="/content">Obsah</a>
      </div>
      <div class="nav-item">
        <a class="nav-link {% if active == 'database' %}active text-white{% endif %}" href="/database">DB</a>
      </div>
      <div class="nav-item">
        <a class="nav-link {% if active == 'logs' %}active text-white{% endif %}" href="/logs">Logy</a>
      </div>
    </div>
  </div>
</nav>

<div class="container-fluid px-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
